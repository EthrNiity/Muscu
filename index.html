<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EthrNiity</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#141517">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#141517;
    --surface:#1b1c1f;
    --surface-2:#222327;
    --surface-3:#2a2b2f;
    --text:#e2e0da;
    --text-dim:#8f8c86;
    --text-faint:#5a5854;
    --accent:#b39ddb;
    --accent-dim:#8874a8;
    --steel:#b39ddb;
    --gold:#e8d48a;
    --green:#8874a8;
    --terracotta:#e8d48a;
    --border:#2a2a28;
    --radius:10px;
  }
  body.light-theme{
    --bg:#f5f3ee;
    --surface:#ffffff;
    --surface-2:#f0eee8;
    --surface-3:#e7e4dc;
    --text:#292723;
    --text-dim:#6b675f;
    --text-faint:#9a958a;
    --accent:#8874a8;
    --accent-dim:#6f5d8c;
    --steel:#8874a8;
    --gold:#a8863a;
    --green:#6f5d8c;
    --terracotta:#a8863a;
    --border:#ded9cd;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
    padding-bottom:84px;
  }
  .mono{font-family:"SF Mono","Consolas","Menlo",monospace; letter-spacing:0.02em;}
  h1,h2,h3{
    font-family:Impact,"Haettenschweiler","Arial Narrow Bold",sans-serif;
    font-weight:400;
    text-transform:uppercase;
    letter-spacing:0.03em;
    margin:0;
  }
  h2.section-title{font-size:15px; color:var(--text-dim); margin-bottom:10px; letter-spacing:0.06em;}
  header.top{
    padding:22px 18px 16px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,#1a1b1f 0%, var(--bg) 100%);
    position:sticky; top:0; z-index:20;
  }
  .header-row{display:flex; align-items:center; justify-content:space-between;}
  .brand{display:flex; align-items:center; gap:10px;}
  .logo-text{
    font-family:Optima, Candara, "Segoe UI", sans-serif;
    font-size:22px; font-weight:400; letter-spacing:0.04em; color:var(--text);
  }
  .logo-accent{color:var(--accent); font-weight:600;}
  .header-right{display:flex; align-items:center; gap:8px;}
  .rank-badge{
    display:flex; align-items:center; gap:6px;
    background:var(--surface-2); border:1px solid var(--border);
    border-radius:20px; padding:5px 10px 5px 6px;
    font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em;
    cursor:default;
  }
  .rank-gem{width:10px; height:10px; border-radius:2px; transform:rotate(45deg); flex-shrink:0;}
  .profile-btn{
    width:32px; height:32px; border-radius:50%;
    background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim);
    display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0;
  }
  .profile-btn:active{background:var(--surface-3);}
  .subline{color:var(--text-dim); font-size:13px; margin-top:10px; font-family:"SF Mono",monospace;}
  main{max-width:720px; margin:0 auto; padding:16px;}
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:14px;
  }
  .exo-card{padding:0; overflow:hidden;}
  .exo-header{
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 16px; cursor:pointer;
    background:var(--surface);
  }
  .exo-header:active{background:var(--surface-2);}
  .exo-name-row{display:flex; align-items:center; gap:8px;}
  .exo-name{font-size:17px; font-weight:600;}
  .tag{
    font-size:10px; text-transform:uppercase; letter-spacing:0.04em;
    padding:2px 6px; border-radius:4px; font-weight:700;
  }
  .exo-hint{color:var(--text-faint); font-size:12px; font-family:"SF Mono",monospace; margin-top:4px;}
  .edit-btn{background:none; border:none; color:var(--text-faint); font-size:14px; cursor:pointer; padding:6px;}
  .exo-body{
    border-top:1px solid var(--border);
    padding:14px 16px;
    background:var(--surface-2);
    display:none;
  }
  .exo-body.open{display:block;}
  .set-row{
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:8px 0; border-bottom:1px dashed var(--border);
    font-family:"SF Mono",monospace; font-size:14px;
  }
  .set-row:last-of-type{border-bottom:none;}
  .set-num{color:var(--text-faint); width:20px;}
  .pr-badge{
    background:var(--gold); color:#1a1500; font-size:10px; font-weight:700;
    padding:2px 6px; border-radius:4px; letter-spacing:0.05em;
    animation:pop 0.4s ease;
  }
  @keyframes pop{0%{transform:scale(0.5);opacity:0;}70%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
  .del-btn{margin-left:auto; background:none; border:none; color:var(--text-faint); font-size:16px; cursor:pointer; padding:4px 8px;}
  .del-btn:hover{color:var(--accent);}
  .add-set-form{display:flex; gap:8px; margin-top:12px;}
  .add-set-form input{
    flex:1; background:var(--surface-3); border:1px solid var(--border);
    color:var(--text); border-radius:8px; padding:10px; font-size:15px;
    font-family:"SF Mono",monospace; min-width:0;
  }
  .add-set-form input:focus{outline:none; border-color:var(--accent);}
  .btn{
    background:var(--accent); color:#fff; border:none; border-radius:8px;
    padding:10px 16px; font-size:14px; font-weight:600; cursor:pointer;
    text-transform:uppercase; letter-spacing:0.03em;
  }
  .btn:active{background:var(--accent-dim);}
  .btn-secondary{background:var(--surface-3); color:var(--gold); border:1px solid rgba(232,212,138,0.28);}
  .btn-secondary:active{background:rgba(232,212,138,0.12);}
  .btn-ghost{background:none; border:1px dashed var(--text-faint); color:var(--text-dim); width:100%; padding:14px;}
  .empty{color:var(--text-faint); text-align:center; padding:30px 10px; font-size:14px;}
  .empty b{color:var(--text-dim); display:block; margin-bottom:4px; font-size:16px;}
  nav.tabs{
    position:fixed; bottom:0; left:0; right:0;
    background:var(--surface); border-top:1px solid var(--border);
    display:flex; z-index:30;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav.tabs button{
    flex:1; background:none; border:none; color:var(--text-faint);
    padding:12px 4px 10px; font-size:11px; text-transform:uppercase;
    letter-spacing:0.04em; cursor:pointer; font-weight:600;
  }
  nav.tabs button.active{color:var(--accent);}
  .view{display:none;}
  .view.active{display:block;}
  .hist-session{border-left:2px solid var(--steel); padding-left:12px; margin-bottom:16px;}
  .hist-date{font-family:"SF Mono",monospace; color:var(--steel); font-size:13px; margin-bottom:6px;}
  .hist-exo{font-size:14px; margin-bottom:3px;}
  .hist-exo .n{color:var(--text-dim); font-weight:600;}
  .hist-exo .s{color:var(--text-faint); font-family:"SF Mono",monospace; font-size:13px;}
  .modal-bg{
    position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:40;
    display:none; align-items:flex-end; justify-content:center;
  }
  .modal-bg.open{display:flex;}
  .modal{
    background:var(--surface-2); border-radius:14px 14px 0 0; padding:20px;
    width:100%; max-width:480px; border-top:1px solid var(--border);
    max-height:88vh; overflow-y:auto;
  }
  .modal label{display:block; font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em; margin:12px 0 6px;}
  .modal input, .modal select{
    width:100%; background:var(--surface-3); border:1px solid var(--border);
    color:var(--text); border-radius:8px; padding:12px; font-size:16px;
  }
  .modal-actions{display:flex; gap:10px; margin-top:16px;}
  .modal-actions .btn{flex:1;}
  .toast{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    background:var(--surface-3); color:var(--text); padding:10px 18px;
    border-radius:20px; font-size:13px; z-index:50; border:1px solid var(--border);
    opacity:0; transition:opacity 0.3s; pointer-events:none;
  }
  .toast.show{opacity:1;}
  select#progExoSelect{
    width:100%; background:var(--surface-3); border:1px solid var(--border);
    color:var(--text); border-radius:8px; padding:10px; font-size:14px; margin-bottom:12px;
  }
  .chart-wrap{position:relative; height:220px;}
  .chart-wrap.tall{height:260px;}
  .stat-row{display:flex; gap:10px; margin-bottom:12px;}
  .stat-box{flex:1; background:var(--surface-3); border-radius:8px; padding:10px 12px; text-align:center;}
  .stat-box .v{font-family:"SF Mono",monospace; font-size:20px; color:var(--text); font-weight:700;}
  .stat-box .l{font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.03em; margin-top:2px;}
  .heatmap{display:flex; gap:3px; overflow-x:auto; padding-bottom:4px;}
  .heat-col{display:flex; flex-direction:column; gap:3px;}
  .heat-cell{width:11px; height:11px; border-radius:2px; background:var(--surface-3);}
  .legend-row{display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; justify-content:center;}
  .legend-item{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-dim);}
  .legend-dot{width:9px; height:9px; border-radius:50%;}
  .insight{font-size:13px; color:var(--text-dim); background:var(--surface-3); border-radius:8px; padding:10px 12px; margin-top:12px; line-height:1.5;}
  .profile-form{display:flex; gap:8px; align-items:flex-end;}
  .profile-form .field{flex:1;}
  .profile-form label{display:block; font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.03em; margin-bottom:6px;}
  .profile-form input{
    width:100%; background:var(--surface-3); border:1px solid var(--border);
    color:var(--text); border-radius:8px; padding:10px; font-size:15px; font-family:"SF Mono",monospace;
  }
  .weight-log-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:7px 0; border-bottom:1px dashed var(--border); font-size:13px;
    font-family:"SF Mono",monospace;
  }
  .weight-log-row:last-child{border-bottom:none;}
  .weight-log-row .d{color:var(--text-faint);}
  .weight-log-row .w{color:var(--text); font-weight:600;}
  #librarySearchInput{
    width:100%; background:var(--surface-3); border:1px solid var(--border);
    color:var(--text); border-radius:8px; padding:12px; font-size:16px;
  }
  .lib-group-title{
    font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.05em;
    margin:14px 0 4px; padding-left:2px;
  }
  .lib-item{
    display:flex; align-items:center; gap:10px; padding:10px 4px;
    border-bottom:1px dashed var(--border); cursor:pointer; background:none; border-left:none; border-right:none; border-top:none;
    width:100%; text-align:left;
  }
  .lib-item:active{background:var(--surface-3);}
  .lib-icon{flex-shrink:0; width:20px; height:20px;}
  .lib-name{flex:1; font-size:14px; color:var(--text);}
  .lib-empty{color:var(--text-faint); font-size:13px; text-align:center; padding:20px 0;}
  #app-root{display:none;}
  #profile-picker{
    display:none; position:fixed; inset:0; background:var(--bg); z-index:100;
    align-items:center; justify-content:center; padding:20px;
  }
  .picker-box{width:100%; max-width:360px;}
  .picker-box label{display:block; font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px;}
  .picker-box input{
    width:100%; background:var(--surface-3); border:1px solid var(--border);
    color:var(--text); border-radius:8px; padding:12px; font-size:16px;
  }
  .picker-profile-row{display:flex; align-items:center; gap:6px; margin-bottom:8px;}
  .picker-profile-btn{
    flex:1; text-align:left; background:var(--surface); border:1px solid var(--border);
    color:var(--text); border-radius:10px; padding:14px 16px; font-size:15px; cursor:pointer;
  }
  .picker-profile-btn:active{background:var(--surface-2);}
  @media (min-width:700px){
    main{padding:24px;}
    .logo-text{font-size:26px;}
    nav.tabs{max-width:520px; left:50%; transform:translateX(-50%); border:1px solid var(--border); border-radius:14px; bottom:16px;}
  }
</style>
</head>
<body>

<div id="profile-picker"></div>

<div id="app-root">
<header class="top">
  <div class="header-row">
    <div class="brand">
      <span class="logo-text"><span class="logo-accent">E</span>thr<span class="logo-accent">N</span>iity</span>
    </div>
    <div class="header-right">
      <div class="rank-badge" id="rankBadge" onclick="openLeaderboardModal()" style="cursor:pointer;"></div>
      <button class="profile-btn" id="profileBtn" onclick="openProfileModal()" aria-label="Profil"></button>
    </div>
  </div>
  <div class="subline" id="todayLabel">—</div>
</header>

<main>
  <div id="view-seance" class="view active"></div>
  <div id="view-stats" class="view"></div>
  <div id="view-nutrition" class="view"></div>
  <div id="view-histo" class="view"></div>
</main>

<nav class="tabs">
  <button data-view="seance" class="active">Séance</button>
  <button data-view="stats">Stats</button>
  <button data-view="nutrition">Nutrition</button>
  <button data-view="histo">Historique</button>
</nav>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle" style="font-size:18px;">Nouvel exercice</h3>
    <label>Nom</label>
    <input type="text" id="newExoInput" placeholder="Ex : Développé couché" autocomplete="off">
    <label>Groupe musculaire</label>
    <select id="newExoGroup"></select>
    <label>Type d'effort</label>
    <select id="newExoType"></select>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn" onclick="confirmAddExo()">Enregistrer</button>
    </div>
    <button class="btn btn-secondary" id="deleteExoBtn" style="width:100%; margin-top:10px; display:none; color:var(--accent);" onclick="confirmDeleteExercise()">🗑 Supprimer définitivement de ma liste</button>
  </div>
</div>

<div class="modal-bg" id="libraryModalBg" onclick="if(event.target===this) closeLibraryModal()">
  <div class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h3 style="font-size:18px;">Ajouter un exercice</h3>
      <button class="del-btn" style="font-size:20px;" onclick="closeLibraryModal()">✕</button>
    </div>
    <input type="text" id="librarySearchInput" placeholder="Rechercher un exercice..." autocomplete="off" style="margin-top:10px;">
    <div id="libraryResults" style="margin-top:10px;"></div>
    <button class="btn btn-secondary" style="width:100%; margin-top:8px;" onclick="closeLibraryModal(); openAddModal();">+ Créer un exercice personnalisé</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="profileModalBg" onclick="if(event.target===this) closeProfileModal()">
  <div class="modal" id="profileModalContent"></div>
</div>

<div class="modal-bg" id="leaderboardModalBg" onclick="if(event.target===this) closeLeaderboardModal()">
  <div class="modal" id="leaderboardModalContent"></div>
</div>

<div class="modal-bg" id="templateBuilderModalBg" onclick="if(event.target===this) closeTemplateBuilderModal()">
  <div class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h3 id="templateBuilderTitle" style="font-size:18px;">Nouveau modèle</h3>
      <button class="del-btn" style="font-size:20px;" onclick="closeTemplateBuilderModal()">✕</button>
    </div>
    <label>Nom du modèle</label>
    <input type="text" id="templateNameInput" placeholder="Ex : Séance Push" autocomplete="off">
    <div id="templateDraftRows" style="margin-top:14px;"></div>
    <button class="btn btn-secondary" style="width:100%;" onclick="addTemplateDraftRow()">+ Ajouter un exercice</button>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeTemplateBuilderModal()">Annuler</button>
      <button class="btn" onclick="saveTemplate()">Enregistrer le modèle</button>
    </div>
  </div>
</div>
</div>

<script>
let data = { exercises: [], sessions: [] };
let expandedExo = null;
let editingExoId = null;
let timerSeconds = 0, timerTotal = 0, timerRunning = false, timerInterval = null;

const MUSCLE_GROUPS = ['Pectoraux','Dos','Épaules','Bras','Jambes','Abdos'];
const MEASUREMENT_POINTS = ['Cou','Épaules','Poitrine','Bras','Avant-bras','Taille','Hanches','Cuisse','Mollet'];
const EXTRA_GROUPS = ['Cardio'];
const ALL_GROUPS = MUSCLE_GROUPS.concat(EXTRA_GROUPS);

const GROUP_ICON_COLOR = {
  'Pectoraux':'#b39ddb', 'Dos':'#9b7fc7', 'Épaules':'#8874a8', 'Bras':'#6b4e96',
  'Jambes':'#e8d48a', 'Abdos':'#d4b85a', 'Cardio':'#c9a88a'
};
const GROUP_ICON_PATH = {
  'Pectoraux':'<circle cx="9" cy="12" r="5"/><circle cx="15" cy="12" r="5"/>',
  'Dos':'<path d="M12 3 L4 21 L12 15 L20 21 Z"/>',
  'Épaules':'<path d="M4 16c0-6 4-10 8-10s8 4 8 10" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>',
  'Bras':'<path d="M6 20c0-6 1-9 4-11 2-1 3 1 2 3-1 2 1 3 3 2 3-1 5 1 5 4 0 3-2 5-6 5H8c-1 0-2-1-2-3z"/>',
  'Jambes':'<rect x="7" y="4" width="4" height="16" rx="2"/><rect x="13" y="4" width="4" height="16" rx="2"/>',
  'Abdos':'<rect x="7" y="5" width="4" height="4" rx="1"/><rect x="13" y="5" width="4" height="4" rx="1"/><rect x="7" y="10" width="4" height="4" rx="1"/><rect x="13" y="10" width="4" height="4" rx="1"/><rect x="7" y="15" width="4" height="4" rx="1"/><rect x="13" y="15" width="4" height="4" rx="1"/>',
  'Cardio':'<path d="M12 21s-8-4.5-8-11a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 6.5-8 11-8 11z"/>'
};
function groupIconSvg(group){
  return '<svg class="lib-icon" viewBox="0 0 24 24" fill="' + (GROUP_ICON_COLOR[group]||'#8f8c86') + '">' + (GROUP_ICON_PATH[group]||'') + '</svg>';
}

const EXERCISE_LIBRARY = [
  {name:"Squat", group:"Jambes", type:"Force"},
  {name:"Soulevé de terre roumain", group:"Jambes", type:"Force"},
  {name:"Presse à cuisses", group:"Jambes", type:"Force"},
  {name:"Squat bulgare", group:"Jambes", type:"Force"},
  {name:"Fentes", group:"Jambes", type:"Volume"},
  {name:"Leg extension", group:"Jambes", type:"Volume"},
  {name:"Leg curl", group:"Jambes", type:"Volume"},
  {name:"Hip thrust", group:"Jambes", type:"Force"},
  {name:"Mollets debout", group:"Jambes", type:"Volume"},

  {name:"Développé couché barre", group:"Pectoraux", type:"Force"},
  {name:"Développé incliné haltère prise semi-neutre", group:"Pectoraux", type:"Force"},
  {name:"Développé décliné barre", group:"Pectoraux", type:"Force"},
  {name:"Écarté haltère à plat", group:"Pectoraux", type:"Volume"},
  {name:"Pec deck (butterfly)", group:"Pectoraux", type:"Volume"},
  {name:"Dips", group:"Pectoraux", type:"Force"},
  {name:"Finisher pec deck quadruple drop set", group:"Pectoraux", type:"Endurance"},

  {name:"Développé militaire barre assis", group:"Épaules", type:"Force"},
  {name:"Développé Arnold", group:"Épaules", type:"Force"},
  {name:"Élévations latérales", group:"Épaules", type:"Volume"},
  {name:"Élévations frontales", group:"Épaules", type:"Volume"},
  {name:"Oiseau (élévation arrière)", group:"Épaules", type:"Volume"},
  {name:"Tirage menton", group:"Épaules", type:"Volume"},
  {name:"Finisher FST7 peck deck inversé", group:"Épaules", type:"Endurance"},

  {name:"Soulevé de terre", group:"Dos", type:"Force"},
  {name:"Traction (pull-up)", group:"Dos", type:"Force"},
  {name:"Rowing buste penché pronation", group:"Dos", type:"Force"},
  {name:"Rowing haltère unilatéral", group:"Dos", type:"Volume"},
  {name:"Tirage vertical supination", group:"Dos", type:"Volume"},
  {name:"Tirage horizontal poulie basse", group:"Dos", type:"Volume"},
  {name:"Tirage unilatéral machine (haut du corps)", group:"Dos", type:"Volume"},
  {name:"Pull over haltère", group:"Dos", type:"Volume"},
  {name:"Face pull", group:"Dos", type:"Volume"},
  {name:"Finisher FST7 poulie basse prise serrée", group:"Dos", type:"Endurance"},

  {name:"Curl barre EZ", group:"Bras", type:"Volume"},
  {name:"Curl haltère alterné", group:"Bras", type:"Volume"},
  {name:"Curl marteau", group:"Bras", type:"Volume"},
  {name:"Curl incliné haltère rotation pro-supi", group:"Bras", type:"Volume"},
  {name:"Pupitre haltère marteau", group:"Bras", type:"Volume"},
  {name:"Haltère au front", group:"Bras", type:"Volume"},
  {name:"Extension triceps poulie haute", group:"Bras", type:"Volume"},

function resizeImageToDataURL(file, callback){
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const size = 160;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const minSide = Math.min(img.width, img.height);
      const sx = (img.width - minSide) / 2, sy = (img.height - minSide) / 2;
      ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, size, size);
      callback(canvas.toDataURL('image/jpeg', 0.75));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function normalizeData(){
  if(!Array.isArray(data.exercises)) data.exercises = [];
  if(!Array.isArray(data.sessions)) data.sessions = [];
  data.exercises.forEach(e=>{
    if(!ALL_GROUPS.includes(e.muscleGroup)) e.muscleGroup = MUSCLE_GROUPS[0];
    if(!EFFORT_TYPES.some(t=>t.key===e.type)) e.type = 'Volume';
    if(e.archived===undefined) e.archived = false;
  });
  data.sessions.forEach(s=>{
    if(!s.entries) s.entries = {};
    if(!s.done) s.done = {};
    if(!Array.isArray(s.activeExercises)){
      const ids = new Set([...Object.keys(s.entries||{}), ...Object.keys(s.done||{})]);
      s.activeExercises = [...ids];
    }
  });
  if(!data.profile) data.profile = { heightCm:null, weightLog:[] };
  if(data.profile.age===undefined) data.profile.age = null;
  if(data.profile.sex===undefined) data.profile.sex = null;
  if(data.profile.activityLevel===undefined) data.profile.activityLevel = null;
  if(data.profile.goal===undefined) data.profile.goal = null;
  if(!Array.isArray(data.profile.weightLog)) data.profile.weightLog = [];
  if(!Array.isArray(data.profile.measurements)) data.profile.measurements = [];
  if(!Array.isArray(data.templates)) data.templates = [];
}

function getOrCreateTodaySession(){
  const iso = todayISO();
  let s = data.sessions.find(s=>s.date===iso);
  if(!s){ s = {id:'sess_'+Date.now(), date: iso, entries:{}, done:{}, activeExercises:[]}; data.sessions.push(s); }
  if(!s.done) s.done = {};
  if(!Array.isArray(s.activeExercises)) s.activeExercises = [];
  return s;
}

function allSetsForExercise(exoId, excludeSessionId){
  const out = [];
  for(const s of data.sessions){
    if(s.id===excludeSessionId) continue;
    const sets = s.entries[exoId];
    if(sets) sets.forEach(st=>out.push(Object.assign({}, st, {date:s.date})));
  }
  return out;
}
function bestWeight(exoId, excludeSessionId){
  const sets = allSetsForExercise(exoId, excludeSessionId);
  if(!sets.length) return null;
  return sets.reduce((m,s)=> s.weight>m ? s.weight : m, 0);
}
function lastPerformance(exoId, excludeSessionId){
  const sets = allSetsForExercise(exoId, excludeSessionId);
  if(!sets.length) return null;
  sets.sort((a,b)=> a.date < b.date ? 1 : -1);
  const lastDate = sets[0].date;
  return sets.filter(s=>s.date===lastDate);
}

function daysSinceLastSession(){
  const dates = data.sessions.filter(s=>Object.keys(s.entries).length>0).map(s=>s.date);
  if(!dates.length) return null;
  const latest = dates.slice().sort().slice(-1)[0];
  const dt = new Date(latest+"T12:00:00");
  const today = new Date(); today.setHours(12,0,0,0);
  return Math.floor((today-dt)/86400000);
}

function computeRankXP(){
  const sessionCount = data.sessions.filter(s=>Object.keys(s.entries).length>0).length;
  let totalVolume = 0;
  data.sessions.forEach(s=>{
    for(const exoId in s.entries) s.entries[exoId].forEach(st=> totalVolume += st.weight*st.reps);
  });
  const rawXP = Math.round(sessionCount*15 + totalVolume/100);
  const days = daysSinceLastSession();
  let penalty = 0;
  if(days!==null && days>7) penalty = (days-7)*5;
  return { xp: Math.max(0, rawXP - penalty), rawXP, penalty, days };
}

function renderRankBadge(){
  const el = document.getElementById('rankBadge');
  if(!el) return;
  const { xp, penalty, days } = computeRankXP();
  let current = RANK_TIERS[0], next = RANK_TIERS[1];
  for(let i=0;i<RANK_TIERS.length;i++){
    if(xp >= RANK_TIERS[i].min){ current = RANK_TIERS[i]; next = RANK_TIERS[i+1] || null; }
  }
  let title = "XP : " + xp;
  if(next) title += " (encore " + (next.min - xp) + " pour " + next.name + ")";
  if(penalty>0) title += " — inactif depuis " + days + "j, -" + penalty + " XP";
  el.title = title;
  el.innerHTML = '<span class="rank-gem" style="background:' + current.color + '"></span>' + current.name
    + (penalty>0 ? '<span style="color:var(--text-faint); margin-left:2px;">⚠</span>' : '');
}

function formatTime(s){

}
function updateTimerUI(){

function tickTimer(){
  timerSeconds--;
  if(timerSeconds<=0){
    clearInterval(timerInterval); timerInterval=null; timerRunning=false; timerSeconds=0;
    updateTimerUI();
    playBeep();
    if(navigator.vibrate) navigator.vibrate([200,100,200]);
    showToast("⏱️ Repos terminé !");
    return;
  }
  updateTimerUI();
}
function startTimer(sec){
  clearInterval(timerInterval);
  timerSeconds = sec; timerTotal = sec; timerRunning = true;
  updateTimerUI();
  timerInterval = setInterval(tickTimer, 1000);
}
function toggleTimer(){
  if(timerRunning){
    clearInterval(timerInterval); timerInterval=null; timerRunning=false; updateTimerUI();
  } else {
    if(timerSeconds<=0) return;
    timerRunning = true; updateTimerUI();
    timerInterval = setInterval(tickTimer, 1000);
  }
}
function resetTimer(){
  clearInterval(timerInterval); timerInterval=null; timerRunning=false; timerSeconds=0; timerTotal=0;
  updateTimerUI();
}
function playBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880;
    g.gain.setValueAtTime(0.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.35);
    o.start();
    o.stop(ctx.currentTime+0.35);
  }catch(e){}
}

function sessionMuscleGroups(session){

  const exoIds = new Set([...Object.keys(session.entries||{}).filter(id=>session.entries[id] && session.entries[id].length), ...Object.keys(session.done||{}).filter(id=>session.done[id])]);
  exoIds.forEach(exoId=>{
    const exo = data.exercises.find(e=>e.id===exoId);
    if(exo && !groups.includes(exo.muscleGroup)) groups.push(exo.muscleGroup);
  });
  return groups;
}

function startTemplate(t){
  const session = getOrCreateTodaySession();
  let addedCount = 0;
  t.exercises.forEach(te=>{
    const exo = data.exercises.find(e=>e.id===te.exoId);
    if(!exo) return;
    if(!session.activeExercises.includes(exo.id)) session.activeExercises.push(exo.id);
    if(!session.entries[exo.id]) session.entries[exo.id] = [];
    for(let i=0;i<te.sets;i++){
      session.entries[exo.id].push({ weight: te.weight||0, reps: te.reps||0, ts: Date.now()+i });
    }
    addedCount++;
  });
  saveData();
  renderSeance();
  renderStats();
  if(addedCount < t.exercises.length){
    showToast(t.name + " démarrée (" + (t.exercises.length-addedCount) + " exo(s) manquant(s), supprimés depuis)");
  } else {
    showToast(t.name + " démarrée — ajuste les poids/reps réels si besoin");
  }
}

function openTemplateBuilderModal(templateId){
  if(data.exercises.length===0){ showToast("Ajoute d'abord des exercices à ta liste"); return; }
  editingTemplateId = templateId || null;
  templateDraftRowSeq = 0;
  const existing = editingTemplateId ? (data.templates||[]).find(t=>t.id===editingTemplateId) : null;
  if(existing){
    document.getElementById('templateNameInput').value = existing.name;
    templateDraftRows = existing.exercises
      .filter(te => data.exercises.some(e=>e.id===te.exoId))
      .map(te => ({ rowId:'row_'+(templateDraftRowSeq++), exoId:te.exoId, sets:te.sets, reps:te.reps, weight:te.weight }));
    document.getElementById('templateBuilderTitle').textContent = 'Modifier le modèle';
  } else {
    document.getElementById('templateNameInput').value = '';
    templateDraftRows = [];
    document.getElementById('templateBuilderTitle').textContent = 'Nouveau modèle';
  }
  document.getElementById('templateBuilderModalBg').classList.add('open');
  renderTemplateDraftRows();
}
function closeTemplateBuilderModal(){
  editingTemplateId = null;
  document.getElementById('templateBuilderModalBg').classList.remove('open');
}
function addTemplateDraftRow(){
  syncTemplateDraftFromDOM();
  const activeExo = data.exercises.find(e=>!e.archived) || data.exercises[0];
  templateDraftRows.push({ rowId:'row_'+(templateDraftRowSeq++), exoId:activeExo.id, sets:3, reps:10, weight:'' });
  renderTemplateDraftRows();
}
function removeTemplateDraftRow(rowId){
  syncTemplateDraftFromDOM();
  templateDraftRows = templateDraftRows.filter(r=>r.rowId!==rowId);
  renderTemplateDraftRows();
}
function syncTemplateDraftFromDOM(){
  templateDraftRows.forEach(r=>{
    const exoSel = document.getElementById('tplExo_'+r.rowId);
    const setsInp = document.getElementById('tplSets_'+r.rowId);
    const repsInp = document.getElementById('tplReps_'+r.rowId);
    const wInp = document.getElementById('tplWeight_'+r.rowId);
    if(exoSel) r.exoId = exoSel.value;
    if(setsInp) r.sets = parseInt(setsInp.value)||1;
    if(repsInp) r.reps = parseInt(repsInp.value)||1;
    if(wInp) r.weight = parseFloat(wInp.value)||0;
  });
}
function renderTemplateDraftRows(){
  const el = document.getElementById('templateDraftRows');
  if(templateDraftRows.length===0){
    el.innerHTML = '<div style="color:var(--text-faint); font-size:13px; padding:8px 0;">Aucun exercice ajouté</div>';
    return;
  }
  const inputStyle = 'flex:1; background:var(--surface-3); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:8px; font-size:13px; min-width:0;';
  el.innerHTML = templateDraftRows.map(r=>
    '<div style="border:1px solid var(--border); border-radius:8px; padding:10px; margin-bottom:8px;">'
    + '<div style="display:flex; gap:6px; align-items:center;">'
    + '<select id="tplExo_' + r.rowId + '" style="' + inputStyle + '">'
    + data.exercises.map(e=>'<option value="' + e.id + '"' + (e.id===r.exoId?' selected':'') + '>' + escapeHtml(e.name) + '</option>').join('')
    + '</select>'
    + '<button class="del-btn" onclick="removeTemplateDraftRow(\'' + r.rowId + '\')">✕</button>'
    + '</div>'
    + '<div style="display:flex; gap:6px; margin-top:8px;">'
    + '<input type="number" id="tplSets_' + r.rowId + '" value="' + r.sets + '" placeholder="séries" style="' + inputStyle + '">'
    + '<input type="number" id="tplReps_' + r.rowId + '" value="' + r.reps + '" placeholder="reps" style="' + inputStyle + '">'
    + '<input type="number" id="tplWeight_' + r.rowId + '" value="' + (r.weight||'') + '" placeholder="kg" step="0.5" style="' + inputStyle + '">'
    + '</div></div>'
  ).join('');
}
function saveTemplate(){
  syncTemplateDraftFromDOM();
  const name = document.getElementById('templateNameInput').value.trim();
  if(!name){ showToast("Donne un nom à ce modèle"); return; }
  if(templateDraftRows.length===0){ showToast("Ajoute au moins un exercice"); return; }
  const exercises = templateDraftRows.map(r=>({exoId:r.exoId, sets:r.sets, reps:r.reps, weight:r.weight}));
  if(editingTemplateId){
    const existing = data.templates.find(t=>t.id===editingTemplateId);
    if(existing){ existing.name = name; existing.exercises = exercises; }
    editingTemplateId = null;
  } else {
    data.templates.push({ id:'tpl_'+Date.now(), name:name, exercises: exercises });
  }
  saveData();
  closeTemplateBuilderModal();
  renderSeance();
  showToast("Modèle enregistré");
}

function renderSeance(){
  const el = document.getElementById('view-seance');
  document.getElementById('todayLabel').textContent = fmtDate(todayISO());
  const session = getOrCreateTodaySession();
  const timerHtml = timerCardHtml();
  const summaryHtml = daySummaryHtml(session);
  const todaysExercises = session.activeExercises.map(id=>data.exercises.find(e=>e.id===id)).filter(Boolean);

  let html = timerHtml + summaryHtml;

  if(todaysExercises.length===0){
    html += '<div class="card empty"><b>Aucun exercice pour l\u2019instant</b>Ajoute un exercice pour commencer ta séance, ou démarre un modèle ci-dessous.</div>';
  } else {
    if(todaysExercises.length > 5){
      html += '<input type="text" id="seanceSearchInput" placeholder="Rechercher dans tes exercices..." autocomplete="off" oninput="filterSeanceExercises(this.value)" style="width:100%; background:var(--surface-3); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:12px; font-size:15px; margin-bottom:12px;">';
    }
    todaysExercises.forEach((exo, exoIdx) => {
      const sets = session.entries[exo.id] || [];
      const last = lastPerformance(exo.id, session.id);
      const hint = last ? ("Dernière fois : " + last.map(s=>s.weight+"kg×"+s.reps).join(', ')) : "Pas encore de données";
      const isOpen = expandedExo===exo.id;
      const best = bestWeight(exo.id, session.id);
      const effortColor = EFFORT_TYPES.find(t=>t.key===exo.type).color;

      html += '<div class="card exo-card" data-exo-name="' + normalizeStr(exo.name) + '">'
        + '<div class="exo-header" onclick="toggleExo(\'' + exo.id + '\')">'
        + '<div>'
        + '<div class="exo-name-row"><span class="exo-name">' + escapeHtml(exo.name) + '</span>'
        + '<span class="tag" style="background:' + effortColor + '22; color:' + effortColor + '">' + exo.type + '</span>'
        + '<span class="tag" style="background:var(--surface-3); color:var(--text-dim)">' + exo.muscleGroup + '</span>'
        + (session.done[exo.id] ? '<span class="tag" style="background:var(--green)22; color:var(--green);">✓ Fait</span>' : '')
        + '</div>'
        + '<div class="exo-hint">' + hint + (sets.length? ' · ' + sets.length + " série(s) aujourd'hui" : '') + '</div>'
        + '</div>'
        + '<div style="display:flex; align-items:center; gap:2px;">'
        + '<button class="edit-btn" style="opacity:' + (exoIdx===0?'0.3':'1') + ';" onclick="event.stopPropagation(); moveExercise(\'' + exo.id + '\',-1)" title="Monter">▲</button>'
        + '<button class="edit-btn" style="opacity:' + (exoIdx===todaysExercises.length-1?'0.3':'1') + ';" onclick="event.stopPropagation(); moveExercise(\'' + exo.id + '\',1)" title="Descendre">▼</button>'
        + '<button class="edit-btn" onclick="event.stopPropagation(); removeFromTodaySession(\'' + session.id + '\',\'' + exo.id + '\')" title="Retirer de la séance">✕</button>'
        + '<button class="edit-btn" style="font-size:16px;" onclick="event.stopPropagation(); toggleExoDone(\'' + session.id + '\',\'' + exo.id + '\')" title="Marquer comme fait">' + (session.done[exo.id] ? '✅' : '⬜') + '</button>'
        + '<button class="edit-btn" onclick="event.stopPropagation(); openExerciseComparisonModal(\'' + exo.id + '\')" title="Comparer avec la ligue">🏆</button>'
        + '<button class="edit-btn" onclick="event.stopPropagation(); viewProgressionFor(\'' + exo.id + '\')" title="Voir la progression">📈</button>'
        + '<button class="edit-btn" onclick="event.stopPropagation(); openEditModal(\'' + exo.id + '\')">✎</button>'
        + '<span style="color:var(--text-faint); font-size:18px; padding:0 6px;">' + (isOpen?'−':'+') + '</span>'
        + '</div>'
        + '</div>'
        + '<div class="exo-body ' + (isOpen?'open':'') + '">'
        + (sets.length ? sets.map((s,i)=>{
            const isPR = best!==null && s.weight > best;
            return '<div class="set-row"><span class="set-num">' + (i+1) + '</span>'
              + '<span>' + s.weight + ' kg × ' + s.reps + ' reps</span>'
              + (isPR ? '<span class="pr-badge">PR</span>' : '')
              + '<button class="edit-btn" style="padding:4px 6px;" onclick="editSet(\'' + session.id + '\',\'' + exo.id + '\',' + i + ')">✎</button>'
              + '<button class="del-btn" style="margin-left:0;" onclick="deleteSet(\'' + session.id + '\',\'' + exo.id + '\',' + i + ')">✕</button></div>';
          }).join('') : '<div style="color:var(--text-faint); font-size:13px; padding:6px 0;">Aucune série pour l\u2019instant</div>')
        + '<div class="add-set-form" id="addSetForm_' + exo.id + '">'
        + '<input type="number" inputmode="decimal" step="0.5" placeholder="kg" id="w_' + exo.id + '" value="' + ((editingSet && editingSet.exoId===exo.id && editingSet.sessionId===session.id) ? editingSet.weight : '') + '">'
        + '<input type="number" inputmode="numeric" placeholder="reps" id="r_' + exo.id + '" value="' + ((editingSet && editingSet.exoId===exo.id && editingSet.sessionId===session.id) ? editingSet.reps : '') + '">'
        + '<button class="btn" onclick="addSet(\'' + session.id + '\',\'' + exo.id + '\')">' + ((editingSet && editingSet.exoId===exo.id && editingSet.sessionId===session.id) ? 'Modifier' : 'Ajouter') + '</button>'
        + ((editingSet && editingSet.exoId===exo.id && editingSet.sessionId===session.id) ? '<button class="btn btn-secondary" onclick="cancelEditSet()">✕</button>' : '')
        + '</div>'
        + (last && !(editingSet && editingSet.exoId===exo.id && editingSet.sessionId===session.id) ? '<button class="btn btn-secondary" style="width:100%; margin-top:8px; font-size:12px; padding:8px;" onclick="fillLastPerformance(\'' + exo.id + '\')">↻ Comme la dernière fois (' + last[0].weight + 'kg × ' + last[0].reps + ')</button>' : '')
        + '</div></div>';
    });
  }

  html += '<button class="btn btn-ghost" onclick="openLibraryModal()">+ Ajouter un exercice</button>';
  html += templatesRowHtml();
  if(todaysExercises.length > 0){
    html += '<div class="card"><h2 class="section-title">Note de séance</h2>'
      + '<textarea id="sessionNoteInput" placeholder="Ressenti, fatigue, sommeil..." style="width:100%; min-height:70px; background:var(--surface-3); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:10px; font-size:14px; font-family:inherit; resize:vertical;" oninput="saveSessionNote(this.value)">' + escapeHtml(session.note||'') + '</textarea></div>';
    html += '<button class="btn" style="width:100%; margin-top:4px;" onclick="finishSession()">✓ Terminer la séance</button>';
  }
  el.innerHTML = html;
}

function filterSeanceExercises(query){
  const q = normalizeStr(query||'');
  document.querySelectorAll('#view-seance .exo-card').forEach(card=>{
    const name = card.getAttribute('data-exo-name') || '';
    card.style.display = name.includes(q) ? '' : 'none';
  });
}

function removeFromTodaySession(sessionId, exoId){
  const session = data.sessions.find(s=>s.id===sessionId);
  if(!session) return;
  const hasSets = session.entries[exoId] && session.entries[exoId].length > 0;
  if(hasSets && !window.confirm("Retirer cet exercice de la séance ? Les séries déjà loggées aujourd'hui pour cet exercice seront supprimées.")) return;
  session.activeExercises = (session.activeExercises||[]).filter(id=>id!==exoId);
  delete session.entries[exoId];
  if(session.done) delete session.done[exoId];
  if(editingSet && editingSet.sessionId===sessionId && editingSet.exoId===exoId) editingSet = null;
  if(expandedExo===exoId) expandedExo = null;
  saveData();
  renderSeance();
  showToast("Exercice retiré de la séance");
}

function finishSession(){
  const session = getOrCreateTodaySession();
  if((session.activeExercises||[]).length===0){ showToast("Ajoute au moins un exercice avant de terminer"); return; }
  const groups = sessionMuscleGroups(session);
  const suggested = groups.length ? ('Séance ' + groups.join(', ')) : 'Séance';
  const name = window.prompt("Nom de cette séance :", session.customName || suggested);
  session.customName = (name && name.trim()) ? name.trim() : suggested;
  session.activeExercises = [];
  expandedExo = null;
  editingSet = null;
  saveData();
  renderSeance();
  renderHisto();
  renderStats();
  showToast("Séance enregistrée 💪");
}

function toggleExoDone(sessionId, exoId){
  const session = data.sessions.find(s=>s.id===sessionId);
  if(!session.done) session.done = {};
  session.done[exoId] = !session.done[exoId];
  saveData();
  renderSeance();
}

function saveSessionNote(val){
  const session = getOrCreateTodaySession();
  session.note = val;
  saveData();
}

function moveExercise(exoId, direction){
  const session = getOrCreateTodaySession();
  const arr = session.activeExercises;
  const idx = arr.indexOf(exoId);
  const newIdx = idx + direction;
  if(idx===-1 || newIdx<0 || newIdx>=arr.length) return;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  saveData();
  renderSeance();
}

function fillLastPerformance(exoId){
  const session = getOrCreateTodaySession();
  const last = lastPerformance(exoId, session.id);
  if(!last || !last.length) return;
  const w = document.getElementById('w_'+exoId);
  const r = document.getElementById('r_'+exoId);
  if(w) w.value = last[0].weight;
  if(r) r.value = last[0].reps;
  if(w) w.focus();
}

function toggleExo(id){
  expandedExo = (expandedExo===id) ? null : id;
  renderSeance();
  if(expandedExo){
    setTimeout(()=>{ const inp = document.getElementById('w_'+id); if(inp) inp.focus(); },50);
  }
}

let editingSet = null;

function editSet(sessionId, exoId, idx){
  const session = data.sessions.find(s=>s.id===sessionId);
  const s = session.entries[exoId][idx];
  editingSet = { sessionId, exoId, idx, weight:s.weight, reps:s.reps };
  expandedExo = exoId;
  renderSeance();
  setTimeout(()=>{ const inp = document.getElementById('w_'+exoId); if(inp) inp.focus(); }, 50);
}
function cancelEditSet(){
  editingSet = null;
  renderSeance();
}
function addSet(sessionId, exoId){
  const w = parseFloat(document.getElementById('w_'+exoId).value);
  const r = parseInt(document.getElementById('r_'+exoId).value);
  if(isNaN(w) || isNaN(r) || w<0 || r<0){ showToast("Entre un poids et des reps valides"); return; }
  const session = data.sessions.find(s=>s.id===sessionId);
  if(editingSet && editingSet.sessionId===sessionId && editingSet.exoId===exoId){
    session.entries[exoId][editingSet.idx].weight = w;
    session.entries[exoId][editingSet.idx].reps = r;
    editingSet = null;
    saveData();
    renderSeance();
    showToast("Série modifiée");
    return;
  }
  if(!session.entries[exoId]) session.entries[exoId]=[];
  const prevBest = bestWeight(exoId, sessionId);
  session.entries[exoId].push({weight:w, reps:r, ts:Date.now()});
  saveData();
  renderSeance();
  if(prevBest!==null && w>prevBest) showToast("🏆 Nouveau record : " + w + " kg !");
}

function deleteSet(sessionId, exoId, idx){
  const session = data.sessions.find(s=>s.id===sessionId);
  session.entries[exoId].splice(idx,1);
  if(session.entries[exoId].length===0) delete session.entries[exoId];
  if(editingSet && editingSet.sessionId===sessionId && editingSet.exoId===exoId) editingSet = null;
  saveData();
  renderSeance();
}

// ---------- Modal (add / edit exercise) ----------
function populateSelects(){
  const g = document.getElementById('newExoGroup');
  const t = document.getElementById('newExoType');
  g.innerHTML = ALL_GROUPS.map(m=>'<option value="'+m+'">'+m+'</option>').join('');
  t.innerHTML = EFFORT_TYPES.map(x=>'<option value="'+x.key+'">'+x.key+'</option>').join('');
}
function openAddModal(){
  editingExoId = null;
  document.getElementById('modalTitle').textContent = 'Nouvel exercice';
  populateSelects();
  document.getElementById('newExoInput').value='';
  document.getElementById('deleteExoBtn').style.display = 'none';
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('newExoInput').focus(),100);
}
function openEditModal(exoId){
  editingExoId = exoId;
  const exo = data.exercises.find(e=>e.id===exoId);
  document.getElementById('modalTitle').textContent = "Modifier l'exercice";
  populateSelects();
  document.getElementById('newExoInput').value = exo.name;
  document.getElementById('newExoGroup').value = exo.muscleGroup;
  document.getElementById('newExoType').value = exo.type;
  document.getElementById('deleteExoBtn').style.display = 'block';
  document.getElementById('modalBg').classList.add('open');
}
function confirmDeleteExercise(){
  const exo = data.exercises.find(e=>e.id===editingExoId);
  if(!exo) return;
  if(!window.confirm('Supprimer définitivement "' + exo.name + '" de ta liste ? Ton historique de séries déjà loggées sera conservé, mais tu ne pourras plus la réutiliser. Si tu veux juste ne plus la voir dans la séance d\u2019aujourd\u2019hui, utilise plutôt le ✕ sur sa carte.')) return;
  data.exercises = data.exercises.filter(e=>e.id!==editingExoId);
  data.templates.forEach(t=>{ t.exercises = t.exercises.filter(te=>te.exoId!==editingExoId); });
  data.sessions.forEach(s=>{ s.activeExercises = (s.activeExercises||[]).filter(id=>id!==editingExoId); });
  saveData();
  closeModal();
  renderSeance();
  renderStats();
  showToast(exo.name + " supprimé");
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
  document.getElementById('deleteExoBtn').style.display = 'none';
}

// ---------- Exercise library picker ----------
function openLibraryModal(){
  document.getElementById('libraryModalBg').classList.add('open');
  document.getElementById('librarySearchInput').value = '';
  renderLibraryList('');
  setTimeout(()=>document.getElementById('librarySearchInput').focus(),100);
}
function closeLibraryModal(){
  document.getElementById('libraryModalBg').classList.remove('open');
}
function renderLibraryList(filterText){
  const q = normalizeStr(filterText||'');
  const matches = EXERCISE_LIBRARY.filter(ex => normalizeStr(ex.name).includes(q));
  const el = document.getElementById('libraryResults');
  if(matches.length===0){
    el.innerHTML = '<div class="lib-empty">Aucun résultat. Tu peux créer ton propre exercice ci-dessous.</div>';
    return;
  }
  const groups = ALL_GROUPS.filter(g => matches.some(m=>m.group===g));
  let html = '';
  groups.forEach(g=>{
    html += '<div class="lib-group-title">' + g + '</div>';
    matches.filter(m=>m.group===g).forEach(ex=>{
      const idx = EXERCISE_LIBRARY.indexOf(ex);
      html += '<button class="lib-item" onclick="addFromLibrary(' + idx + ')">'
        + groupIconSvg(ex.group)
        + '<span class="lib-name">' + escapeHtml(ex.name) + '</span>'
        + '<span class="tag" style="background:' + EFFORT_TYPES.find(t=>t.key===ex.type).color + '22; color:' + EFFORT_TYPES.find(t=>t.key===ex.type).color + '">' + ex.type + '</span>'
        + '</button>';
    });
  });
  el.innerHTML = html;
}
function addFromLibrary(idx){
  const ex = EXERCISE_LIBRARY[idx];
  const session = getOrCreateTodaySession();
  let existing = data.exercises.find(e => normalizeStr(e.name) === normalizeStr(ex.name));
  if(!existing){
    existing = {id:'exo_'+Date.now(), name:ex.name, muscleGroup:ex.group, type:ex.type};
    data.exercises.push(existing);
  }
  if(session.activeExercises.includes(existing.id)){
    showToast("Déjà dans ta séance du jour");
    closeLibraryModal();
    return;
  }
  session.activeExercises.push(existing.id);
  saveData();
  closeLibraryModal();
  renderSeance();
  renderStats();
  showToast(ex.name + " ajouté à la séance");
}
function confirmAddExo(){
  const val = document.getElementById('newExoInput').value.trim();
  if(!val){ showToast("Entre un nom d'exercice"); return; }
  const group = document.getElementById('newExoGroup').value;
  const type = document.getElementById('newExoType').value;
  if(editingExoId){
    const exo = data.exercises.find(e=>e.id===editingExoId);
    exo.name = val; exo.muscleGroup = group; exo.type = type;
  } else {
    const newExo = {id:'exo_'+Date.now(), name:val, muscleGroup:group, type:type};
    data.exercises.push(newExo);
    const session = getOrCreateTodaySession();
    if(!session.activeExercises.includes(newExo.id)) session.activeExercises.push(newExo.id);
  }
  saveData();
  closeModal();
  renderSeance();
  renderStats();
}

// ---------- Historique view ----------
function deleteSession(sessionId){
  const session = data.sessions.find(s=>s.id===sessionId);
  if(!session) return;
  if(!window.confirm("Supprimer toute la séance du " + fmtDate(session.date) + " ? Cette action est irréversible.")) return;
  data.sessions = data.sessions.filter(s=>s.id!==sessionId);
  saveData();
  renderHisto();
  renderSeance();
  renderStats();
  showToast("Séance supprimée");
}

let expandedHistorySessions = new Set();
function toggleHistorySession(sessionId){
  if(expandedHistorySessions.has(sessionId)) expandedHistorySessions.delete(sessionId);
  else expandedHistorySessions.add(sessionId);
  renderHisto();
}

function renderHisto(){
  const el = document.getElementById('view-histo');
  const sorted = data.sessions.filter(s=> Object.keys(s.entries).length>0 || Object.keys(s.done||{}).length>0 || s.customName).slice().sort((a,b)=> a.date<b.date?1:-1);
  if(sorted.length===0){
    el.innerHTML = '<div class="card empty"><b>Pas encore d\u2019historique</b>Tes séances passées apparaîtront ici — termine ta première séance depuis l\u2019onglet Séance.</div>';
    return;
  }
  let html = '';
  if(sorted.length > 3){
    html += '<input type="text" id="historySearchInput" placeholder="Rechercher un exercice, une date..." autocomplete="off" oninput="filterHistory(this.value)" style="width:100%; background:var(--surface-3); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:12px; font-size:15px; margin-bottom:12px;">';
  }
  for(const s of sorted){
    const groups = sessionMuscleGroups(s);
    const displayName = s.customName || (groups.length ? ('Séance ' + groups.join(', ')) : 'Séance');
    const isOpen = expandedHistorySessions.has(s.id);
    const exoIds = new Set([...Object.keys(s.entries), ...Object.keys(s.done||{})]);
    const exoNames = [...exoIds].map(id=>{ const e = data.exercises.find(x=>x.id===id); return e ? e.name : ''; });
    const blob = normalizeStr(displayName + ' ' + fmtDate(s.date) + ' ' + exoNames.join(' '));
    html += '<div class="hist-session" data-search-blob="' + blob + '">'
      + '<div class="hist-date" style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="toggleHistorySession(\'' + s.id + '\')">'
      + '<span><b style="color:var(--text); font-family:-apple-system,sans-serif;">' + escapeHtml(displayName) + '</b><br><span style="color:var(--text-faint);">' + fmtDate(s.date) + ' · ' + exoIds.size + ' exo(s)</span></span>'
      + '<span style="display:flex; align-items:center; gap:6px;">'
      + '<button class="edit-btn" onclick="event.stopPropagation(); renameSession(\'' + s.id + '\')" title="Renommer">✎</button>'
      + '<button class="del-btn" onclick="event.stopPropagation(); deleteSession(\'' + s.id + '\')" title="Supprimer cette séance">✕</button>'
      + '<span style="color:var(--text-faint); font-size:16px;">' + (isOpen?'−':'+') + '</span>'
      + '</span></div>';
    if(isOpen){
      exoIds.forEach(exoId=>{
        const exo = data.exercises.find(e=>e.id===exoId);
        const name = exo ? exo.name : '(exercice supprimé)';
        const setList = s.entries[exoId] || [];
        if(setList.length){
          const best = bestWeight(exoId, s.id);
          const sets = setList.map(st=>{
            const isPR = best!==null && st.weight > best;
            return st.weight + "kg×" + st.reps + (isPR ? ' <span style="color:var(--gold);" title="Record à cette date">★</span>' : '');
          }).join(', ');
          html += '<div class="hist-exo" style="margin-top:8px;"><span class="n">' + escapeHtml(name) + '</span> — <span class="s">' + sets + '</span></div>';
        } else if(s.done && s.done[exoId]){
          html += '<div class="hist-exo" style="margin-top:8px;"><span class="n">' + escapeHtml(name) + '</span> — <span class="s">✓ fait (sans détail)</span></div>';
        }
      });
      if(s.note){
        html += '<div class="insight" style="margin-top:10px;">📝 ' + escapeHtml(s.note) + '</div>';
      }
    }
    html += '</div>';
  }
  el.innerHTML = html;
}
function filterHistory(query){
  const q = normalizeStr(query||'');
  document.querySelectorAll('#view-histo .hist-session').forEach(card=>{
    const blob = card.getAttribute('data-search-blob') || '';
    card.style.display = blob.includes(q) ? '' : 'none';

function renameSession(sessionId){
  const s = data.sessions.find(x=>x.id===sessionId);
  if(!s) return;
  const groups = sessionMuscleGroups(s);
  const current = s.customName || (groups.length ? ('Séance ' + groups.join(', ')) : 'Séance');
  const name = window.prompt("Renommer cette séance :", current);
  if(name===null) return;
  s.customName = name.trim() || current;
  saveData();
  renderHisto();
}

function longestStreak(){
  const dates = [...new Set(data.sessions.filter(s=>Object.keys(s.entries).length>0).map(s=>s.date))].sort();
  if(!dates.length) return 0;
  let max=1, cur=1;
  for(let i=1;i<dates.length;i++){
    const prev = new Date(dates[i-1]+"T12:00:00");
    const curD = new Date(dates[i]+"T12:00:00");
    if((curD-prev)/86400000 === 1){ cur++; max=Math.max(max,cur); } else { cur=1; }
  }
  return max;
}

function renderRegularity(){
  const days = 91;
  const today = new Date();
  today.setHours(12,0,0,0);
  const volumeByDate = {};
  data.sessions.forEach(s=>{
    let vol = 0;
    for(const exoId in s.entries) s.entries[exoId].forEach(st=> vol += st.weight*st.reps);
    if(vol>0) volumeByDate[s.date] = vol;
  });

  // stats
  const last30 = Object.keys(volumeByDate).filter(d=>{
    const dt = new Date(d+"T12:00:00");
    return (today - dt) / 86400000 <= 30;
  }).length;
  let streak = 0;
  for(let i=0;i<days;i++){
    const dt = new Date(today); dt.setDate(dt.getDate()-i);
    const iso = toLocalISO(dt);
    if(volumeByDate[iso]) streak++;
    else if(i>0 || !volumeByDate[todayISO()]) break;
  }
  document.getElementById('statBoxes').innerHTML =
    '<div class="stat-row">'
    + '<div class="stat-box"><div class="v">' + last30 + '</div><div class="l">séances / 30j</div></div>'
    + '<div class="stat-box"><div class="v">' + streak + '</div><div class="l">jours de suite</div></div>'
    + '<div class="stat-box"><div class="v">' + data.sessions.filter(s=>Object.keys(s.entries).length>0).length + '</div><div class="l">séances au total</div></div>'
    + '</div>';

  // heatmap: 13 weeks columns, 7 rows, oldest to newest
  const start = new Date(today); start.setDate(start.getDate()-(days-1));
  const dow = start.getDay(); // 0=Sun
  const offset = (dow===0)?6:dow-1; // align to Monday start
  const cells = [];
  for(let i=0;i<offset;i++) cells.push(null);
  for(let i=0;i<days;i++){
    const dt = new Date(start); dt.setDate(dt.getDate()+i);
    cells.push(toLocalISO(dt));
  }
  while(cells.length % 7 !== 0) cells.push(null);
  const cols = [];
  for(let c=0;c<cells.length/7;c++) cols.push(cells.slice(c*7,c*7+7));

  let maxVol = 0;
  Object.values(volumeByDate).forEach(v=>{ if(v>maxVol) maxVol=v; });

  let html = '<div class="heatmap">';
  cols.forEach(col=>{
    html += '<div class="heat-col">';
    col.forEach(iso=>{
      if(!iso){ html += '<div class="heat-cell"></div>'; return; }
      const v = volumeByDate[iso];
      let bg = 'var(--surface-3)';
      if(v){
        const ratio = maxVol>0 ? v/maxVol : 0;
        const alpha = 0.25 + ratio*0.75;
        bg = 'rgba(179,157,219,' + alpha.toFixed(2) + ')';
      }
      html += '<div class="heat-cell" style="background:' + bg + '" title="' + fmtShort(iso) + (v? (' · '+Math.round(v)+' kg déplacés') : ' · repos') + '"></div>';
    });
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('heatmapWrap').innerHTML = html;
}

const ACTIVITY_LEVELS = [
  {key:'sedentaire', label:'Sédentaire (peu ou pas de sport)', mult:1.2},
  {key:'leger', label:'Léger (1-3 séances/sem.)', mult:1.375},
  {key:'modere', label:'Modéré (3-5 séances/sem.)', mult:1.55},
  {key:'actif', label:'Actif (6-7 séances/sem.)', mult:1.725},
  {key:'tresactif', label:'Très actif (sport intense + travail physique)', mult:1.9}
];
const GOALS = [
  {key:'perte', label:'Perte de poids'},
  {key:'maintien', label:'Maintien'},
  {key:'prise', label:'Prise de masse'}
];

function computeNutrition(){
  const w = latestWeight();
  const h = data.profile.heightCm;
  const age = data.profile.age;
  const sex = data.profile.sex;
  const activity = ACTIVITY_LEVELS.find(a=>a.key===data.profile.activityLevel);
  const goal = data.profile.goal;
  if(!w || !h || !age || !sex || !activity || !goal) return null;

  const bmr = sex==='H' ? (10*w + 6.25*h - 5*age + 5) : (10*w + 6.25*h - 5*age - 161);
  const tdee = bmr * activity.mult;
  let target = tdee;
  if(goal==='perte') target = tdee - 500;
  else if(goal==='prise') target = tdee + 300;
  target = Math.max(1200, target);

  const proteinG = Math.round(w * 1.6);
  const proteinKcal = proteinG * 4;
  const fatKcal = target * 0.25;
  const fatG = Math.round(fatKcal / 9);
  const carbKcal = Math.max(0, target - proteinKcal - fatKcal);
  const carbG = Math.round(carbKcal / 4);

  return {
    bmr: Math.round(bmr), tdee: Math.round(tdee), target: Math.round(target),
    proteinG, fatG, carbG,
    proteinPct: Math.round(proteinKcal/target*100),
    fatPct: Math.round(fatKcal/target*100),
    carbPct: Math.round(carbKcal/target*100)
  };
}

  }catch(e){ return { url:'', anonKey:'', syncCode:'', leaderboardCode:'' }; }
}
function saveSyncConfigFromForm(){
  const cfg = {
    url: document.getElementById('syncUrlInput').value.trim(),
    anonKey: document.getElementById('syncKeyInput').value.trim(),
    syncCode: document.getElementById('syncCodeInput').value.trim(),
    leaderboardCode: document.getElementById('leaderboardCodeInput').value.trim()
  };

async function uploadToCloud(){
  const cfg = loadSyncConfig();
  if(!cfg.url || !cfg.anonKey || !cfg.syncCode){ showToast("Renseigne d'abord tes identifiants cloud"); return; }
  showToast("Envoi en cours...");
  try{
    const res = await fetch(cfg.url.replace(/\/$/,'') + '/rest/v1/backups', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey': cfg.anonKey,
        'Authorization':'Bearer ' + cfg.anonKey,
        'Prefer':'resolution=merge-duplicates'
      },
      body: JSON.stringify({ sync_key: cfg.syncCode, payload: data, updated_at: new Date().toISOString() })
    });
    if(!res.ok){
      const errText = await res.text();
      window.alert("Erreur d'envoi cloud (HTTP " + res.status + ")\n\n" + errText);
      return;
    }
    const sessCount = data.sessions.filter(s=>Object.keys(s.entries).length>0).length;
    showToast("Envoyé vers le cloud ✓ (" + sessCount + " séance(s))");
  }catch(e){
    window.alert("Erreur d'envoi cloud (réseau)\n\n" + e.message);
  }
}
async function downloadFromCloud(){
  const cfg = loadSyncConfig();
  if(!cfg.url || !cfg.anonKey || !cfg.syncCode){ showToast("Renseigne d'abord tes identifiants cloud"); return; }
  if(!window.confirm("Ça va remplacer tes données locales par celles du cloud. Continuer ?")) return;
  showToast("Récupération...");
  try{
    const res = await fetch(cfg.url.replace(/\/$/,'') + '/rest/v1/backups?sync_key=eq.' + encodeURIComponent(cfg.syncCode) + '&select=payload,updated_at', {
      headers:{ 'apikey': cfg.anonKey, 'Authorization':'Bearer ' + cfg.anonKey }
    });
    if(!res.ok){
      const errText = await res.text();
      window.alert("Erreur de récupération cloud (HTTP " + res.status + ")\n\n" + errText);
      return;
    }
    const rows = await res.json();
    if(!rows.length){ showToast("Aucune sauvegarde trouvée pour ce code"); return; }
    data = rows[0].payload;
    normalizeData();
    saveData();
    render();
    renderProfil();
    const sessCount = data.sessions.filter(s=>Object.keys(s.entries).length>0).length;
    const lastDate = data.sessions.filter(s=>Object.keys(s.entries).length>0).map(s=>s.date).sort().slice(-1)[0];
    window.alert("✅ Données récupérées du cloud\n\n" + sessCount + " séance(s) au total" + (lastDate ? "\nDernière séance : " + fmtDate(lastDate) : "") + "\n" + data.exercises.length + " exercice(s) dans la bibliothèque\n\nSauvegardée le : " + (rows[0].updated_at ? new Date(rows[0].updated_at).toLocaleString('fr-FR') : '—'));
  }catch(e){
    window.alert("Erreur de récupération cloud (réseau)\n\n" + e.message);
  }
}

function exportData(){
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const activeProfile = getProfilesList().find(p=>p.id===ACTIVE_PROFILE_ID);
  const label = activeProfile ? normalizeStr(activeProfile.name).replace(/\s+/g,'-') : 'export';
  a.href = url;
  a.download = 'ethrniity-' + label + '-' + todayISO() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("Export téléchargé");
}
function importDataFile(event){
  const file = event.target.files[0];
  if(!file) return;
  if(!window.confirm("Importer ce fichier va remplacer toutes tes données actuelles sur ce profil. Continuer ?")){
    event.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const imported = JSON.parse(e.target.result);
      if(!imported || typeof imported !== 'object' || !Array.isArray(imported.exercises) || !Array.isArray(imported.sessions)){
        throw new Error('Format de fichier invalide');
      }
      data = imported;
      normalizeData();
      saveData();
      render();
      renderProfil();
      showToast("Données importées ✓");
    }catch(err){
      window.alert("Impossible d'importer ce fichier.\n\n" + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

let lastLeaderboardPush = 0;
async function pushToLeaderboard(){
  const cfg = loadSyncConfig();
  if(!cfg.url || !cfg.anonKey || !cfg.leaderboardCode) return;
  const now = Date.now();
  if(now - lastLeaderboardPush < 15000) return;
  lastLeaderboardPush = now;
  const activeProfile = getProfilesList().find(pr=>pr.id===ACTIVE_PROFILE_ID);
  if(!activeProfile) return;
  const { xp, days, penalty } = computeRankXP();
  let current = RANK_TIERS[0];
  for(let i=0;i<RANK_TIERS.length;i++){ if(xp >= RANK_TIERS[i].min) current = RANK_TIERS[i]; }
  try{
    await fetch(cfg.url.replace(/\/$/,'') + '/rest/v1/leaderboard', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey': cfg.anonKey,
        'Authorization':'Bearer ' + cfg.anonKey,
        'Prefer':'resolution=merge-duplicates'
      },
      body: JSON.stringify({
        group_code: cfg.leaderboardCode,
        profile_key: ACTIVE_PROFILE_ID,
        name: activeProfile.name,
        avatar: activeProfile.avatar || null,
        xp: xp,
        rank_name: current.name,
        inactive_days: (penalty>0 ? days : 0),
        updated_at: new Date().toISOString()
      })
    });
  }catch(e){ /* silent - leaderboard push is best-effort */ }
}

let lastExerciseRecordsPush = 0;
async function pushExerciseRecords(){
  const cfg = loadSyncConfig();
  if(!cfg.url || !cfg.anonKey || !cfg.leaderboardCode) return;
  const now = Date.now();
  if(now - lastExerciseRecordsPush < 15000) return;
  lastExerciseRecordsPush = now;
  const activeProfile = getProfilesList().find(pr=>pr.id===ACTIVE_PROFILE_ID);
  if(!activeProfile) return;
  const rows = [];
  data.exercises.forEach(exo=>{
    const sets = allSetsForExercise(exo.id, null);
    if(!sets.length) return;
    let best = sets[0];
    sets.forEach(s=>{ if(s.weight > best.weight) best = s; });
    rows.push({
      group_code: cfg.leaderboardCode,
      profile_key: ACTIVE_PROFILE_ID,
      exercise_name: normalizeStr(exo.name),
      name: activeProfile.name,
      avatar: activeProfile.avatar || null,
      best_weight: best.weight,
      best_reps: best.reps,
      updated_at: new Date().toISOString()
    });
  });
  if(!rows.length) return;
  try{
    await fetch(cfg.url.replace(/\/$/,'') + '/rest/v1/exercise_records', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey': cfg.anonKey,
        'Authorization':'Bearer ' + cfg.anonKey,
        'Prefer':'resolution=merge-duplicates'
      },
      body: JSON.stringify(rows)
    });
  }catch(e){ /* silent - best-effort */ }
}

        const isMe = row.profile_key === ACTIVE_PROFILE_ID;
        html += '<div class="weight-log-row" style="align-items:center;' + (isMe ? ' background:var(--surface-3); border-radius:8px; padding:8px 10px;' : '') + '">'
          + '<span style="width:20px; color:var(--text-faint); font-family:\'SF Mono\',monospace;">' + (i+1) + '</span>'
          + avatarHtml({avatar:row.avatar, name:row.name}, 32)
          + '<span style="flex:1; margin-left:10px;">' + escapeHtml(row.name) + (isMe ? ' <span style="color:var(--text-faint); font-size:11px;">(toi)</span>' : '') + '</span>'
          + '<span class="d">' + row.best_weight + ' kg' + (row.best_reps ? ' × ' + row.best_reps : '') + '</span>'
          + '</div>';
      });
    }
    content.innerHTML = html;
  }catch(e){
    content.innerHTML = title + '<div class="insight">Erreur de chargement de la comparaison.</div>';
  }
}

async function openLeaderboardModal(){
  const cfg = loadSyncConfig();
  const bg = document.getElementById('leaderboardModalBg');
  const content = document.getElementById('leaderboardModalContent');
  bg.classList.add('open');
  if(!cfg.url || !cfg.anonKey || !cfg.leaderboardCode){
    content.innerHTML = '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><h3 style="font-size:18px;">Classement</h3><button class="del-btn" style="font-size:20px;" onclick="closeLeaderboardModal()">✕</button></div>'
      + '<div class="insight">Configure un \u00ab code de classement \u00bb partagé avec tes potes dans Profil → Synchronisation cloud pour activer cette fonctionnalité.</div>';
    return;
  }
  content.innerHTML = '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><h3 style="font-size:18px;">Classement</h3><button class="del-btn" style="font-size:20px;" onclick="closeLeaderboardModal()">✕</button></div>'
    + '<div class="insight">Chargement...</div>';
  try{
    const res = await fetch(cfg.url.replace(/\/$/,'') + '/rest/v1/leaderboard?group_code=eq.' + encodeURIComponent(cfg.leaderboardCode) + '&select=*&order=xp.desc', {
      headers:{ 'apikey': cfg.anonKey, 'Authorization':'Bearer ' + cfg.anonKey }
    });
    if(!res.ok) throw new Error('http error');
    const rows = await res.json();
    renderLeaderboardList(rows);
  }catch(e){
    content.innerHTML = '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><h3 style="font-size:18px;">Classement</h3><button class="del-btn" style="font-size:20px;" onclick="closeLeaderboardModal()">✕</button></div>'
      + '<div class="insight">Erreur de chargement du classement.</div>';
  }
}
function renderLeaderboardList(rows){
  const content = document.getElementById('leaderboardModalContent');
  let html = '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><h3 style="font-size:18px;">Classement</h3><button class="del-btn" style="font-size:20px;" onclick="closeLeaderboardModal()">✕</button></div>';
  if(!rows.length){
    html += '<div class="insight">Personne dans ce classement pour l\u2019instant. Partage ton code de classement à tes potes pour qu\u2019ils vous rejoignent.</div>';
  } else {
    rows.forEach((row,i)=>{
      const isMe = row.profile_key === ACTIVE_PROFILE_ID;
      const tier = RANK_TIERS.find(t=>t.name===row.rank_name) || RANK_TIERS[0];
      html += '<div class="weight-log-row" style="align-items:center;' + (isMe ? ' background:var(--surface-3); border-radius:8px; padding:8px 10px;' : '') + '">'
        + '<span style="width:20px; color:var(--text-faint); font-family:\'SF Mono\',monospace;">' + (i+1) + '</span>'
        + avatarHtml({avatar:row.avatar, name:row.name}, 32)
        + '<span style="flex:1; margin-left:10px;">' + escapeHtml(row.name) + (isMe ? ' <span style="color:var(--text-faint); font-size:11px;">(toi)</span>' : '') + '</span>'
        + '<span class="rank-gem" style="background:' + tier.color + '; margin-right:6px;"></span>'
        + '<span class="d" style="min-width:70px; text-align:right;">' + row.rank_name + '</span>'
        + '</div>';
    });
  }
  content.innerHTML = html;
}
function closeLeaderboardModal(){
  document.getElementById('leaderboardModalBg').classList.remove('open');
}

function handleProfileAvatarChange(e){
  const file = e.target.files[0];
  if(!file) return;
  resizeImageToDataURL(file, (dataUrl)=>{
    const list = getProfilesList();
    const p = list.find(pr=>pr.id===ACTIVE_PROFILE_ID);
    if(p){
      p.avatar = dataUrl;
      saveProfilesList(list);
      renderProfil();
      renderProfileButton();
      pushToLeaderboard();
      pushExerciseRecords();
      showToast("Photo mise à jour");
    }
  });
}

function saveHeight(){
  const v = parseFloat(document.getElementById('heightInput').value);
  if(isNaN(v) || v<=0){ showToast("Entre une taille valide"); return; }
  data.profile.heightCm = v;
  saveData();
  renderProfil();
  renderNutrition();
  showToast("Taille enregistrée");
}

function logWeight(){
  const date = document.getElementById('weightDateInput').value || todayISO();
  const val = parseFloat(document.getElementById('weightInput').value);
  if(isNaN(val) || val<=0){ showToast("Entre un poids valide"); return; }
  const existing = data.profile.weightLog.find(e=>e.date===date);
  if(existing) existing.weight = val;
  else data.profile.weightLog.push({date, weight:val});
  saveData();
  renderNutrition();
  showToast("Pesée enregistrée");
}

function deleteWeightEntry(date){
  data.profile.weightLog = data.profile.weightLog.filter(e=>e.date!==date);
  saveData();
  renderNutrition();
}

function logMeasurement(){
  const date = document.getElementById('measureDateInput').value || todayISO();
  const values = {};
  let any = false;
  MEASUREMENT_POINTS.forEach(pt=>{
    const inp = document.getElementById('measure_' + normalizeStr(pt));
    const v = parseFloat(inp.value);
    if(!isNaN(v) && v>0){ values[pt] = v; any = true; }
  });
  if(!any){ showToast("Renseigne au moins une mesure"); return; }
  const existing = data.profile.measurements.find(e=>e.date===date);
  if(existing) Object.assign(existing.values, values);
  else data.profile.measurements.push({date, values});
  saveData();
  renderNutrition();
  showToast("Mensurations enregistrées");
}
function deleteMeasurementEntry(date){
  data.profile.measurements = data.profile.measurements.filter(e=>e.date!==date);
  saveData();
  renderNutrition();
}
function renderMeasurementChart(){
  const sel = document.getElementById('measureChartSelect');
  const canvas = document.getElementById('measureCanvas');
  if(!sel || !canvas) return;
  const point = sel.value;
  const chrono = data.profile.measurements
    .filter(e=>e.values[point]!=null)
    .slice()
    .sort((a,b)=> a.date<b.date?-1:1);
  if(measureChart) measureChart.destroy();
  if(chrono.length < 2) return;
  measureChart = new Chart(canvas, {
    type:'line',
    data:{
      labels: chrono.map(e=>fmtShort(e.date)),
      datasets:[{
        label: point + ' (cm)',
        data: chrono.map(e=>e.values[point]),
        borderColor:'#b39ddb',
        backgroundColor:'rgba(179,157,219,0.15)',
        tension:0.3,
        fill:true,
        pointBackgroundColor:'#b39ddb',
        pointRadius:4
      }]
    },
    options:{
      maintainAspectRatio:false,
      scales:{
        x:{ ticks:{ color:'#8f8c86', font:{size:10} }, grid:{ color:'#222327' } },
        y:{ ticks:{ color:'#8f8c86', font:{size:10} }, grid:{ color:'#222327' } }
      },
      plugins:{ legend:{ display:false } }
    }
  });
}

function switchTab(viewName){
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active', b.dataset.view===viewName));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+viewName).classList.add('active');
  if(viewName==='stats') renderStats();
  if(viewName==='nutrition') renderNutrition();
}
document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=> switchTab(btn.dataset.view));
});

function viewProgressionFor(exoId){
  switchTab('stats');
  setTimeout(()=>{
    const sel = document.getElementById('progExoSelect');
    if(sel && [...sel.options].some(o=>o.value===exoId)){
      sel.value = exoId;
      renderProgressionChart();
      if(sel.scrollIntoView) sel.scrollIntoView({behavior:'smooth', block:'center'});
    } else {
      showToast("Pas encore de données pour cet exercice");
    }
  }, 50);
}

document.getElementById('newExoInput').addEventListener('keydown', e=>{
  if(e.key==='Enter') confirmAddExo();
});
document.getElementById('librarySearchInput').addEventListener('input', e=>{
  renderLibraryList(e.target.value);
});

boot();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').then(reg=>{
      reg.addEventListener('updatefound', ()=>{
        const newSW = reg.installing;
        if(!newSW) return;
        newSW.addEventListener('statechange', ()=>{
          if(newSW.state==='installed' && navigator.serviceWorker.controller){
            showUpdateBanner();
          }
        });
      });
    }).catch(()=>{});
  });
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(refreshing) return;
    refreshing = true;
    window.location.reload();
  });
}
function showUpdateBanner(){
  if(document.getElementById('updateBanner')) return;
  const bar = document.createElement('div');
  bar.id = 'updateBanner';
  bar.style.cssText = 'position:fixed; top:0; left:0; right:0; z-index:200; background:var(--accent); color:#141517; text-align:center; padding:10px; font-size:13px; font-weight:600; cursor:pointer;';
  bar.textContent = '🔄 Nouvelle version disponible — appuie pour mettre à jour';
  bar.onclick = ()=>{ window.location.reload(); };
  document.body.appendChild(bar);
}
</script>
